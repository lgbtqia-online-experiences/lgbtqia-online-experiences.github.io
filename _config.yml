# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: "LGBTQIA+ online experiences"
masthead_title: " "
name: "LGBTQIA+ online experiences"
email: "af.dasilvapinho@uva.nl"
description: >-
  Research project exploring social media use, online experiences, and
  well-being among LGBTQIA+ communities, including a survey and a
  social media data donation.

url: "https://lgbtqia-online-experiences.github.io"
baseurl: ""

minimal_mistakes_skin: "default"
search: true

markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes"

timezone: "Europe/Amsterdam"

include:
  - _pages

plugins:
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
      toc: true
      toc_sticky: true


  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: false
      comments: false
      share: false
      related: false

footer:
  links: []

survey_link: "https://uva.fra1.qualtrics.com/jfe/form/SV_cAyrM3syhnVgVpQ"
tool_link: "https://uva.fra1.qualtrics.com/jfe/form/SV_0unPEPXEC7qe5jo"

project:
  title: "Understanding the online experiences of people identifying LGBTQIA+"
  short_title: "LGBTQIA+ online experiences"
  researcher_name: "Ana da Silva Pinho"
  researcher_email: "a.f.dasilvapinho@uva.nl"
  institution: "University of Amsterdam"
  faculty: "Faculty of Social and Behavioural Sciences"
